- generic [ref=e2]: "# SYNC-DOCUMENTATION ## API Docs - Auth Token [Gera o token de utilização da aplicação](https://syncpay.apidog.io/gera-o-token-de-utiliza%C3%A7%C3%A3o-da-aplica%C3%A7%C3%A3o-18075876e0.md): Endpoint para geração do Bearer Token para efetuar as requests. - Saldo [Retorna o Saldo do Usuário](https://syncpay.apidog.io/retorna-o-saldo-do-usu%C3%A1rio-18308815e0.md): - Transações [Consulta status da transação](https://syncpay.apidog.io/consulta-status-da-transa%C3%A7%C3%A3o-18075877e0.md): O identifier é retornado tanto no cashin quanto no cashout. - Utmify [Salvar Token](https://syncpay.apidog.io/salvar-token-21267302e0.md): - Utmify [Desativa Token](https://syncpay.apidog.io/desativa-token-21267309e0.md): - Partner [Consulta dados do Parceiro](https://syncpay.apidog.io/consulta-dados-do-parceiro-18075878e0.md): - Pix - CashIn [Solicitação de depósito via Pix](https://syncpay.apidog.io/solicita%C3%A7%C3%A3o-de-dep%C3%B3sito-via-pix-18075879e0.md): Permite requisição de pagamento Pix. IP e chave de API devem ser autorizados. Após o processamento, webhooks de criação ou atualização serão enviados para a callbackUrl fornecida. - Pix - CashOut [Solicitação de saque Pix](https://syncpay.apidog.io/solicita%C3%A7%C3%A3o-de-saque-pix-18075881e0.md): Permite solicitação de saque via Pix. Autenticação e IP autorizado são obrigatórios. - Webhooks > Cashin > Old [OnCreate/OnUpdate](https://syncpay.apidog.io/oncreateonupdate-20187726e0.md): TODOS OS WEBHOOKS TEM TIMEOUT DE 5 SEGUNDOS - Webhooks > Cashin [OnCreate](https://syncpay.apidog.io/oncreate-19542402e0.md): Payload do webhook enviado no evento de criação de uma nova transação de cashin. - Webhooks > Cashin [OnUpdate](https://syncpay.apidog.io/onupdate-19542520e0.md): Payload do webhook enviado no evento da atualização de uma transação de cashin. - Webhooks > Cashout [OnCreate](https://syncpay.apidog.io/oncreate-19542523e0.md): Payload do webhook enviado no evento de criação de uma nova transação de cashout. - Webhooks > Cashout [OnUpdate](https://syncpay.apidog.io/onupdate-19542541e0.md): Payload do webhook enviado no evento da atualização de uma transação de cashout. - Webhooks [ListAll](https://syncpay.apidog.io/listall-19542558e0.md): - Webhooks [Create](https://syncpay.apidog.io/create-19542617e0.md): - Webhooks [Update](https://syncpay.apidog.io/update-19542619e0.md): - Webhooks [Delete](https://syncpay.apidog.io/delete-19542627e0.md): - Old API [CashIn](https://syncpay.apidog.io/cashin-20187696e0.md): Endpoint da V1 replicada pra V2 - Old API [Consulta os dados do Parceiro](https://syncpay.apidog.io/consulta-os-dados-do-parceiro-20187697e0.md): ## Schemas - Webhook > CashIn [onCreate](https://syncpay.apidog.io/oncreate-8297203d0.md): - Webhook > CashIn [onUpdate](https://syncpay.apidog.io/onupdate-8297540d0.md): - Webhook > CashOut [onCreate](https://syncpay.apidog.io/oncreate-8297546d0.md): - Webhook > CashOut [onUpdate](https://syncpay.apidog.io/onupdate-8297547d0.md):"